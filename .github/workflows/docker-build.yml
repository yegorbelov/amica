name: Build & Push Backend

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Build & push main backend image ---
      - name: Build & push main backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository_owner }}/amica:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Build & push nginx image ---
      - name: Build & push amica-nginx image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.nginx
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository_owner }}/amica-nginx:latest
          # cache-from: type=gha
          # cache-to: type=gha,mode=max
