name: Build & Push Backend

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v2

      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push main backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/amica:latest

      - name: Build & push Celery image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.celery
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/amica-celery:latest
